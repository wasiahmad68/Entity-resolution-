version: '3.8'

services:
  er-engine:
    build: .
    volumes:
      - .:/app
      # Optional persistence mount for SQLite
      - ./data:/app/data
    environment:
      # Use SQLite locally. Swap this to postgresql://user:pass@db:5432/er to scale up.
      - DATABASE_URL=sqlite:////app/data/er_engine.db
